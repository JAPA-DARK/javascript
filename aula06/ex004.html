<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio de Java Script</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: black;
            color: aliceblue;

        }
     
    </style>
</head>
<body>
    
    <script>
        var nome = window.prompt('qual é o seu nome?')
        document.write(`seu nome tem ${nome.length} letras.<br>`) //conta quantos caracteres a string possui
        document.write(`seu nome em maiúsculo é ${nome.toUpperCase()}<br>`) // tudo para maiúsculo
        document.write(`seu nome em minúsculo é ${nome.toLowerCase()}<br>`) // tudo para minúsculo
    </script>
</body>
</html>
