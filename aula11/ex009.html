<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>verificador de nacionalidade</title>
    <style>
        body {
            background-color: rgb(0, 0, 0);
            color: azure;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
        }
        h1 {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(197, 22, 22);
            border-radius: 5px;
            padding: 10px;
            box-shadow: 1px 2px 1px  rgba(202, 199, 199, 0.788);
        }
        p {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-size: 1em;
            font-weight: bold;
        }
        input {
            margin-top: 2px;
            width: 250px;
            height: 30px;
        }
        input#txtpais {
            margin-bottom: 20px;
        }
        input#button {
            height: 30px;
            width: 100px;
            background-color: gray;
            border: 1px solid white;
        }
        div#res {
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <h1>verifique sua nacionalidade</h1>
     <p>Pais em que voce nasceu</p> <input type="text" name="txtpais" id="txtpais" placeholder="pais">
    <input type="button" value="verificar" id="button" onclick="calcular()">
    <div id="res">resultado</div>
    <script>
        function calcular() {
            var txtp = window.document.querySelector('input#txtpais')
            var res = window.document.querySelector('div#res')
            var nacionalidade = (txtp.value)
            res.innerHTML = `<p>seu pais de origem é <strong>${nacionalidade}</strong></p>`
            if (nacionalidade == 'brasil') {
                res.innerHTML += '<p>voce é <strong>Brasileiro</strong></p>'
            } else {
                res.innerHTML += '<p>voce é <strong>estrangeiro</strong>.</p>'
            }
        }
    </script>
</body>
</html>
